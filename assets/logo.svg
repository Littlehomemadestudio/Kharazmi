<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1C1C22"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#D4AF37" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8C7012"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)"/>

  <!-- Outer gold glow -->
  <circle cx="256" cy="256" r="220" fill="url(#goldGlow)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.2"/>

  <!-- Islamic geometric star pattern (8-pointed star) -->
  <g transform="translate(256,240)" opacity="0.9">
    <!-- 8-pointed star -->
    <polygon points="0,-140 37,-57 126,-52 58,13 77,100 0,56 -77,100 -58,13 -126,-52 -37,-57"
             fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <polygon points="0,-140 37,-57 126,-52 58,13 77,100 0,56 -77,100 -58,13 -126,-52 -37,-57"
             fill="#D4AF37" opacity="0.05"/>

    <!-- Inner 8-pointed star rotated 22.5 degrees -->
    <polygon points="0,-100 26,-41 90,-37 41,9 55,71 0,40 -55,71 -41,9 -90,-37 -26,-41"
             fill="none" stroke="url(#goldGrad)" stroke-width="1.5" transform="rotate(22.5)"/>
    <polygon points="0,-100 26,-41 90,-37 41,9 55,71 0,40 -55,71 -41,9 -90,-37 -26,-41"
             fill="#D4AF37" opacity="0.03" transform="rotate(22.5)"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#F5C842" stroke-width="1" opacity="0.4"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#F5C842"/>
    <circle cx="0" cy="0" r="4" fill="#0A0A0B"/>

    <!-- Decorative lines from center -->
    <g stroke="#D4AF37" stroke-width="0.8" opacity="0.4">
      <line x1="0" y1="-55" x2="0" y2="-80"/>
      <line x1="39" y1="-39" x2="57" y2="-57"/>
      <line x1="55" y1="0" x2="80" y2="0"/>
      <line x1="39" y1="39" x2="57" y2="57"/>
      <line x1="0" y1="55" x2="0" y2="80"/>
      <line x1="-39" y1="39" x2="-57" y2="57"/>
      <line x1="-55" y1="0" x2="-80" y2="0"/>
      <line x1="-39" y1="-39" x2="-57" y2="-57"/>
    </g>

    <!-- Small diamonds at outer points -->
    <g fill="#D4AF37" opacity="0.6">
      <polygon points="0,-140 4,-134 0,-128 -4,-134" />
      <polygon points="126,-52 130,-46 124,-46" />
      <polygon points="77,100 73,94 83,94" />
      <polygon points="-77,100 -83,94 -73,94" />
      <polygon points="-126,-52 -130,-46 -124,-46" />
    </g>
  </g>

  <!-- RASK! text -->
  <text x="256" y="420" text-anchor="middle" font-family="'Inter', 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="52" font-weight="800" letter-spacing="8" fill="url(#goldGrad)">
    RASK!
  </text>

  <!-- Subtitle -->
  <text x="256" y="450" text-anchor="middle" font-family="'Inter', 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="11" font-weight="400" letter-spacing="4" fill="#A8A294" opacity="0.7">
    INTELLIGENT PLANNING
  </text>

  <!-- Decorative line under text -->
  <line x1="196" y1="460" x2="316" y2="460" stroke="#D4AF37" stroke-width="0.8" opacity="0.4"/>

  <!-- Corner ornaments -->
  <g stroke="#D4AF37" stroke-width="0.8" fill="none" opacity="0.25">
    <!-- Top-left -->
    <path d="M20,50 L20,20 L50,20"/>
    <!-- Top-right -->
    <path d="M462,20 L492,20 L492,50"/>
    <!-- Bottom-left -->
    <path d="M20,462 L20,492 L50,492"/>
    <!-- Bottom-right -->
    <path d="M462,492 L492,492 L492,462"/>
  </g>
</svg>
